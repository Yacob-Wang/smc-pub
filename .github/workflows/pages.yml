# 将仓库 Markdown 构建为 GitHub Pages 站点
# 首次启用: 仓库 Settings → Pages → Build and deployment → Source = GitHub Actions

name: Deploy GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements-docs.txt

      - name: Install MkDocs
        run: pip install -r 00-Meta/scripts/requirements-docs.txt

      - name: Prepare docs/
        run: python 00-Meta/scripts/prepare_web_docs.py

      - name: Build site
        run: mkdocs build --verbose

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
