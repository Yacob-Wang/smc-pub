# 稳知库 · GitHub Pages 博客
# 本地预览:
#   pip install -r scripts/requirements-docs.txt
#   py -3.12 scripts/prepare_web_docs.py
#   mkdocs serve
site_name: 稳知库
site_description: JacobKing · Android 稳定性架构师系列技术博客（AOSP 17 + android17-6.18）
site_author: JacobKing

# docs/ 由 prepare_web_docs.py 生成；关闭「编辑此页」避免链到临时 docs/ 路径
edit_uri: ""

docs_dir: docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  custom_dir: docs/overrides
  language: zh
  features:
    # 顶栏模块 Tab；侧栏只展示当前模块/系列，避免 500+ 篇堆在一起
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.prune
    # 默认折叠：访问 /01-Mechanism/Framework/A01-.../ 时点顶部 tab 回 01-Mechanism/，
    # 侧栏只显示 6 个 AOSP 分层入口，不展开 Kernel/FS/Binder 等子分类
    # （与 01-Mechanism/.pages 的 `collapse: true` 配合）
    - navigation.top
    - navigation.footer
    - navigation.path
    - navigation.instant
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - toc.follow
  palette:
    # Android 绿系（参考 developer.android.com / source.android.com）
    # 实际颜色由 extra.css 用 CSS 变量覆盖（#3DDC84 主色 + #00C853 辅色）
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    logo: material/android
  font:
    # 用 Noto Sans SC 兼容中英文（Material 自动从 Google Fonts 加载）
    # Roboto Flex 通过 extra_head 单独加载（Material 自带的 font.text 是简化版字重）
    text: Noto Sans SC
    code: JetBrains Mono

plugins:
  - search:
      lang:
        - zh
        - en
      separator: '[\s\u200b\-/,.]+'
  - awesome-pages

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# 历史相对链接较多，先保证能发布
strict: false

validation:
  omitted_files: warn
  absolute_links: ignore
  unrecognized_links: ignore

extra:
  generator: false
  homepage: /

extra_css:
  - stylesheets/fonts.css
  - stylesheets/extra.css

extra_javascript:
  - javascripts/search.js
  - javascripts/filter.js

copyright: Copyright &copy; JacobKing · Stability Matrix Course

