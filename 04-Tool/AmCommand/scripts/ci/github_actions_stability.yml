# GitHub Actions 稳定性巡检模板
# 详见 06 篇 §6.1

name: Android Stability Check

on:
  # PR 触发(改动 app 或稳定性脚本时)
  pull_request:
    paths:
      - 'app/**'
      - 'AmCommand/**'

  # 每日定时(凌晨 2 点)
  schedule:
    - cron: '0 2 * * *'

  # 手动触发
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Package name (e.g. com.example.app)'
        required: true
        default: 'com.example.app'
      baseline_ms:
        description: 'Baseline cold start time (ms)'
        required: true
        default: '720'

# 取消正在跑的同分支旧任务
concurrency:
  group: stability-${{ github.ref }}
  cancel-in-progress: true

env:
  PACKAGE_NAME: ${{ github.event.inputs.package_name || 'com.example.app' }}
  BASELINE_MS: ${{ github.event.inputs.baseline_ms || '720' }}

jobs:
  # ==================== Job 1: 冷启动巡检 ====================
  cold-start-check:
    name: 冷启动性能巡检
    runs-on: [self-hosted, android, pixel]   # 必须自托管 runner,带真机
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r AmCommand/scripts/requirements.txt

      - name: Verify adb device
        run: |
          adb devices
          # 期望输出至少一行 device
          adb devices | grep -q "device$" || (echo "No device found" && exit 1)

      - name: Install APK
        run: |
          test -f app/build/outputs/apk/debug/app-debug.apk || \
            (./gradlew assembleDebug)
          adb install -r app/build/outputs/apk/debug/app-debug.apk

      - name: Run cold start check
        id: cold_start
        run: |
          python AmCommand/scripts/check_cold_start.py \
            --package "$PACKAGE_NAME" \
            --activities .MainActivity .MineActivity .OrderActivity .DetailActivity .SettingActivity \
            --baseline-ms "$BASELINE_MS" \
            --threshold-pct 20 \
            --samples 3 \
            --with-trace \
            --output-dir ./reports/cold_start

      - name: Upload cold start report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cold-start-report-${{ github.run_id }}
          path: reports/cold_start/
          retention-days: 14

      - name: Comment on PR (cold start)
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = './reports/cold_start/latest.md';
            if (!fs.existsSync(path)) {
              console.log('No report found, skipping comment');
              return;
            }
            const report = fs.readFileSync(path, 'utf8');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report.slice(0, 60000)  // GitHub 评论上限
            });

      - name: Notify Slack (cold start fail)
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: |
            :rotating_light: *冷启动巡检失败*
            • PR: ${{ github.event.pull_request.html_url || github.run_id }}
            • See: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ==================== Job 2: 内存压力巡检 ====================
  memory-pressure-check:
    name: 内存压力巡检
    runs-on: [self-hosted, android, pixel]
    timeout-minutes: 30
    needs: cold-start-check

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r AmCommand/scripts/requirements.txt

      - name: Install APK
        run: |
          adb install -r app/build/outputs/apk/debug/app-debug.apk

      - name: Run memory pressure check
        run: |
          python AmCommand/scripts/check_memory_pressure.py \
            --package "$PACKAGE_NAME" \
            --duration-sec 600 \
            --dump-interval-sec 120 \
            --output-dir ./reports/memory_pressure

      - name: Upload memory report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: memory-pressure-report-${{ github.run_id }}
          path: reports/memory_pressure/
          retention-days: 14

  # ==================== Job 3: 进程稳定性巡检 ====================
  process-stability-check:
    name: 进程稳定性巡检
    runs-on: [self-hosted, android, pixel]
    timeout-minutes: 45
    needs: cold-start-check

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r AmCommand/scripts/requirements.txt

      - name: Install APK
        run: |
          adb install -r app/build/outputs/apk/debug/app-debug.apk

      - name: Run process stability check
        run: |
          python AmCommand/scripts/check_process_stability.py \
            --package "$PACKAGE_NAME" \
            --iterations 1000 \
            --throttle-ms 100 \
            --with-collect-on-crash \
            --output-dir ./reports/stability

      - name: Upload stability report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stability-report-${{ github.run_id }}
          path: reports/stability/
          retention-days: 14

      - name: Notify Slack (stability fail)
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: |
            :rotating_light: *进程稳定性巡检失败*
            • PR: ${{ github.event.pull_request.html_url || github.run_id }}
            • See: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ==================== Job 4: 综合汇总 ====================
  summary:
    name: 汇总报告
    runs-on: ubuntu-latest
    needs: [cold-start-check, memory-pressure-check, process-stability-check]
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: reports/
          pattern: '*-report-*'

      - name: Generate summary report
        run: |
          cat <<EOF > reports/SUMMARY.md
          # Android 稳定性巡检汇总
          ## 时间
          $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          ## 见各报告 artifact
          EOF
          ls -la reports/

      - name: Upload summary
        uses: actions/upload-artifact@v4
        with:
          name: summary-${{ github.run_id }}
          path: reports/SUMMARY.md