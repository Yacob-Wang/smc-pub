## 3. App 端 SDK 集成示例

```java
// 稳定性 SDK 内部(伪代码)
public class AmDumpheapCapture {

    public void captureOnMemoryPressure(Process targetProc) {
        // 1. 检查灰度
        if (!isGrayChannel()) return;

        // 2. 检查冷却
        if (isInCooldown(targetProc.pid)) return;

        // 3. 触发 am dumpheap
        try {
            String outputPath = "/data/local/tmp/oom_capture.hprof";
            // 实际调用:
            //   am dumpheap <pid> <file>
            String[] cmd = {"am", "dumpheap",
                            String.valueOf(targetProc.pid), outputPath};
            Process p = Runtime.getRuntime().exec(cmd);
            int exit = p.waitFor();

            if (exit == 0) {
                // 4. 压缩
                FileCompressor.gzip(outputPath);

                // 5. 上传
                uploadToServer(outputPath + ".gz");
            }
        } catch (Exception e) {
            Log.e("AmDumpheap", "capture failed", e);
        } finally {
            // 6. 标记冷却
            markCooldown(targetProc.pid);
        }
    }
}
```

