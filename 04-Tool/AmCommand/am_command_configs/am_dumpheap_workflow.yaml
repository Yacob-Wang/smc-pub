## 4. 配套 LeakCanary 灰度

```
┌──────────────┬──────────────────────┬──────────────────────┐
│   场景        │  工具                 │  触发方式            │
├──────────────┼──────────────────────┼──────────────────────┤
│ Debug 包     │ LeakCanary            │ 自动,泄漏即 dump     │
│ 灰度包(1%)   │ am dumpheap           │ SDK 阈值触发         │
│ 全量包       │ 仅监控 + logcat       │ 无 dump,只打点       │
└──────────────┴──────────────────────┴──────────────────────┘
```

**为什么不全量包也用 am dumpheap?**
- dump 期间 app 卡 5-30s(详见 [04 §7.1](../04-堆内存转储-dumpheap详解.md#71-dumpheap-期间的-app-卡顿stop-the-world-5-30s))
- 全量包影响范围大
- 灰度包先用,验证稳定后再逐步放开

