## 6. 5 分钟自检清单

集成后,用这个清单验证:

- [ ] Debug 包触发 → hprof 文件成功生成
- [ ] hprof-conv 转换无报错
- [ ] MAT 能打开转换后文件
- [ ] Leak Suspects Report 输出
- [ ] 上传到 server 成功(看 server 日志)
- [ ] Dashboard 显示本次 dump
- [ ] 告警通道收到(如果有泄漏)
- [ ] dump 期间 ANR 告警已排除
- [ ] 冷却机制工作(30 分钟内不重复触发)
- [ ] 灰度包生效,全量包不触发
