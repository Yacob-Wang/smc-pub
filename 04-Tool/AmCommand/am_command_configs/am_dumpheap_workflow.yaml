# am_command_configs/am_dumpheap_workflow.yaml

> **配套文章**:[04-堆内存转储-dumpheap详解 §6 线上 OOM 现场保留](../04-堆内存转储-dumpheap详解.md#6-实战-3线上-oom-现场保留)
> **基线**:AOSP `android-14.0.0_r1`

线上 OOM 现场保留的工作流配置模板,用于稳定性 SDK 集成。

---

## 1. 触发策略

```yaml
# am_dumpheap_workflow.yaml
# 集成到稳定性 SDK 内部,作为 dumpheap 触发配置

trigger:
  # 策略 1:内存阈值触发(最常用)
  memory_threshold:
    enabled: true
    metric: pss   # pss / rss / java_heap / native_heap
    threshold_mb: 700
    # 触发后冷却时间(避免连续触发)
    cooldown_minutes: 30
    # 同一进程同一会话只触发一次
    once_per_session: true

  # 策略 2:用户操作触发
  user_action:
    enabled: true
    # 用户点击"反馈问题"时附带 dump
    on_feedback: true
    # 用户连续 3 次崩溃
    crash_count_3: true

  # 策略 3:定时巡检(后台)
  periodic:
    enabled: false   # 默认关闭,避免影响用户
    interval_hours: 24
    only_when_idle: true   # 仅在充电 + 空闲时
    max_size_mb: 200       # 超过则不上传,只记录

# 灰度策略
rollout:
  # 仅在灰度包启用
  enabled_channels:
    - "gray"
    - "beta"
  # 全量包不启用(避免影响所有用户)
  disabled_channels:
    - "production"

# 隐私过滤
privacy:
  # 排除敏感路径
  exclude_paths:
    - "/data/data/com.example.app/files/user_*"
    - "/data/data/com.example.app/databases/auth_*"
  # 字段脱敏(SDK 内部处理)
  anonymize_fields:
    - "phone"
    - "email"
    - "idcard"
```

---

## 2. 端到端流程

```yaml
pipeline:
  # Step 1: 触发 am dumpheap
  step_1_dump:
    command: "am dumpheap"
    args:
      pid: "{target_pid}"     # 动态替换
      file: "/data/local/tmp/oom_capture.hprof"
    timeout_seconds: 60
    on_failure: abort_upload

  # Step 2: 拉取文件
  step_2_pull:
    # 设备侧:压缩后存到 sdcard
    compress:
      command: "gzip"
      args: ["-f", "/data/local/tmp/oom_capture.hprof"]
    upload:
      protocol: "https"
      endpoint: "https://stability.example.com/api/oom/upload"
      method: "POST"
      headers:
        X-Device-Id: "{device_id}"
        X-App-Version: "{app_version}"
        X-OOM-Type: "am-dumpheap"
      timeout_seconds: 300
      retry:
        max_attempts: 3
        backoff_seconds: [5, 15, 30]

  # Step 3: 服务端处理
  step_3_server:
    decompress: gunzip
    hprof_conv: "platform-tools/hprof-conv"
    mat_analysis:
      generate_leak_suspects: true
      generate_dominator_tree: true
      oql_queries:
        - "SELECT * FROM android.app.Activity"
        - "SELECT * FROM android.graphics.Bitmap"
        - "SELECT * FROM android.os.Handler"
    archive:
      bucket: "s3://stability-artifacts/oom/{date}/{device_id}/"
      retention_days: 30
    alert:
      on_critical_leak: true
      slack_channel: "#stability-alerts"
      jira_project: "STAB"
      jira_priority: "P1"
```

