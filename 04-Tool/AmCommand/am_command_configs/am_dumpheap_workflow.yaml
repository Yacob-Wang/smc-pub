## 5. 监控指标

```yaml
metrics:
  # 触发率
  - name: oom_capture_trigger_rate
    type: counter
    description: OOM 触发 dumpheap 次数

  # 成功率
  - name: oom_capture_success_rate
    type: gauge
    description: 触发到成功上传的成功率

  # dump 耗时
  - name: oom_capture_duration_seconds
    type: histogram
    description: am dumpheap 执行耗时
    buckets: [5, 10, 20, 30, 60]

  # 文件大小
  - name: oom_capture_file_size_mb
    type: histogram
    description: hprof 文件大小
    buckets: [50, 100, 200, 500]

  # 上传耗时
  - name: oom_capture_upload_seconds
    type: histogram
    description: 上传耗时
    buckets: [10, 30, 60, 120, 300]
```

